<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello minesweeper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="customizer">
      <div id="numbersection">
        <div>rows:<input type="number"  value="25" id="rows" /></div>
        <div>columns:<input type="number" value="25" id="columns" /></div>
        <div>bombs:<input type="number" value="25" id="bombs" /></div>
      </div>
      <span class="change" onclick="changeValue()">Change Values</span>
    </div>
    <hr />
    <div class="frame">
      <div id="grid" style="width: 0px; height: 0px"></div>
    </div>

    <div id="win" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeWin()">&times;</span>
        <p>You win</p>
      </div>
    </div>
    <div id="lose" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeLose()">&times;</span>
        <p>You Lose</p>
      </div>

    <script src="script.js"></script>
  </body>
</html>

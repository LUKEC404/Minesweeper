<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="customizer">
    <div id="numbersection">
      <div><label for="rows">rows:</label><input type="number" value="10" id="rows" min="1" max="50" /></div>
      <div><label for="columns">columns:</label><input type="number" value="10" id="columns" min="1" max="50" /></div>
      <div><label for="bombs">bombs:</label><input type="number" value="10" id="bombs" min="1" /></div>
    </div>
    <button class="change">New Game</button>
  </div>
  
  <div class="frame">
    <div id="grid"></div>
  </div>

  <div id="win" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>You Win!</p>
    </div>
  </div>
  
  <div id="lose" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <p>You Lose!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
